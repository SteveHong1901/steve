  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #fafafa;
      color: #171717;
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .back {
      display: inline-block;
      margin-bottom: 2rem;
      color: #666;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back:hover { color: #171717; }
    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .gallery img {
      width: 100%;
      border-radius: 8px;
      object-fit: cover;
      aspect-ratio: 1;
    }
    @media (max-width: 480px) {
      .gallery { grid-template-columns: 1fr; }
    }
  </style>
</head>
